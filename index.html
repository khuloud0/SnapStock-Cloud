<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapStock | Serverless Demo</title>
    <style>
        :root { --accent: #00d1b2; --dark-bg: #1a1a1a; --card-bg: #242424; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--dark-bg); color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: var(--card-bg); padding: 40px; border-radius: 28px; box-shadow: 0 30px 60px rgba(0,0,0,0.4); text-align: center; border: 1px solid #333; max-width: 420px; }
        h1 { font-size: 2rem; margin-bottom: 10px; color: var(--accent); letter-spacing: -1px; }
        p { color: #aaa; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.6; }
        .btn { background: var(--accent); color: #1a1a1a; border: none; padding: 18px 30px; font-size: 1.1rem; border-radius: 14px; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 100%; font-weight: 700; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .btn:disabled { background: #444; color: #888; transform: none; }
        #status { margin-top: 25px; font-size: 0.9rem; font-weight: 500; }
        .success { color: #48c774; padding: 10px; border-radius: 8px; background: rgba(72, 199, 116, 0.1); }
        .error { color: #f14668; padding: 10px; border-radius: 8px; background: rgba(241, 70, 104, 0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1>SnapStock Cloud 📦</h1>
    <p>Technical demonstration of a Serverless payment processing system built entirely on AWS Cloud infrastructure.</p>
    
    <button id="ghostButton" class="btn">Confirm Order (Ghost Checkout)</button>
    
    <div id="status"></div>
</div>

<script>
    document.getElementById('ghostButton').addEventListener('click', async () => {
        const btn = document.getElementById('ghostButton');
        const status = document.getElementById('status');
        
        // Ensure this URL is your exact API endpoint ending with /checkout
        const apiURL = 'https://t7seath5ff.execute-api.us-east-1.amazonaws.com/checkout';
        
        btn.disabled = true;
        status.className = '';
        status.innerText = "⏳ Sending signal to AWS Lambda...";

        try {
            const response = await fetch(apiURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                status.className = 'success';
                status.innerText = "✔ Success! Cloud engine sent a confirmation email.";
            } else {
                const errorData = await response.text();
                console.error('Server Error:', errorData);
                throw new Error();
            }
        } catch (error) {
            status.className = 'error';
            status.innerText = "❌ Request Failed. Please verify CORS settings in AWS.";
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
