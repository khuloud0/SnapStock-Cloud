<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Checkout</title>
    <style>
        /* تصميم سينمائي بسيط جداً */
        body {
            background-color: #000000; /* خلفية سوداء بالكامل */
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, sans-serif;
        }

        .btn {
            background-color: #ffffff; /* زر أبيض بسيط */
            color: #000000;
            border: none;
            padding: 20px 60px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px; /* شكل بيضاوي أنيق */
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #f0f0f0;
        }

        .btn:disabled {
            background-color: #333;
            color: #777;
            cursor: not-allowed;
        }

        #status {
            margin-top: 30px;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 0.5px;
            min-height: 20px;
        }

        .success-text {
            color: #00ff88; /* لون أخضر نيون خفيف للنجاح */
        }
    </style>
</head>
<body>

    <button id="ghostButton" class="btn">Buy Now</button>
    <div id="status"></div>

    <script>
        const btn = document.getElementById('ghostButton');
        const status = document.getElementById('status');
        const apiURL = 'https://t7seath5ff.execute-api.us-east-1.amazonaws.com/checkout';

        btn.addEventListener('click', async () => {
            // حالة الانتظار
            btn.disabled = true;
            btn.innerText = 'Processing...';
            status.innerHTML = '';

            try {
                const response = await fetch(apiURL, { method: 'POST' });

                if (response.ok) {
                    // حالة النجاح
                    btn.innerText = 'Purchased';
                    btn.style.backgroundColor = '#00ff88'; // يتحول الزر للأخضر عند النجاح
                    status.innerHTML = '<span class="success-text">✓ Order executed via Serverless Engine</span>';
                } else {
                    throw new Error();
                }
            } catch (error) {
                // حالة الخطأ
                status.innerHTML = '<span style="color: #ff4444;">Connection failed</span>';
                btn.disabled = false;
                btn.innerText = 'Buy Now';
            }
        });
    </script>
</body>
</html>
